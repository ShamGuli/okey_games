<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#b8924d">
  <title>Keçmiş Oyunlar — OKEY</title>
  <link rel="stylesheet" href="/css/style.css?v=3">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎴%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header class="header">
    <div class="logo">OKEY</div>
    <a href="/" class="nav-link">← Ana Səhifə</a>
  </header>

  <main class="container">
    <div class="section-title">Keçmiş Oyunlar</div>
    <div id="history-list">
      <div class="loader-block">
        <div class="loader"></div>
      </div>
    </div>
  </main>

  <!-- ===== Detal modal ===== -->
  <div id="detail-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px;">
          <h2 class="card-title" id="detail-title" style="margin: 0;">Oyun Detalı</h2>
          <button id="close-modal-btn" class="btn btn-small btn-secondary">Bağla</button>
        </div>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js?v=3"></script>
  <script src="/js/history.js?v=3"></script>
</body>
</html>

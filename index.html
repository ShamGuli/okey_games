<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#b8924d">
  <meta name="description" content="OKEY — canlı xal vərəqi. İki oyunçu, 5 raund, real vaxtda izləmə.">
  <title>OKEY — Canlı Xal Vərəqi</title>
  <link rel="stylesheet" href="/css/style.css?v=8">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎴%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header class="header">
    <div class="logo">OKEY</div>
    <a href="/history.html" class="nav-link">Keçmiş Oyunlar →</a>
  </header>

  <main class="container">
    <!-- ===== Home view ===== -->
    <div id="home-view">
      <div class="card">
        <h2 class="card-title">Yeni Oyun</h2>
        <input
          type="text"
          id="player1-input"
          class="input"
          placeholder="Oyunçu 1"
          maxlength="30"
          autocomplete="off">
        <input
          type="text"
          id="player2-input"
          class="input"
          placeholder="Oyunçu 2"
          maxlength="30"
          autocomplete="off">
        <button id="start-game-btn" class="btn btn-primary">Oyuna Başla</button>
        <div id="start-message" class="form-message"></div>
      </div>
    </div>

    <!-- ===== Game view ===== -->
    <div id="game-view" style="display: none;">
      <div class="game-toolbar">
        <div class="live-indicator" id="live-indicator">
          <div class="live-dot"></div>
          <span>Bağlanır...</span>
        </div>
        <button id="new-game-btn" class="btn btn-small btn-secondary">Yeni Oyun</button>
      </div>

      <div id="winner-container"></div>

      <div class="score-table-wrap">
        <table class="score-table" id="score-table">
          <thead>
            <tr>
              <th class="round-label">Əl</th>
              <th id="player1-header">Oyunçu 1</th>
              <th id="player2-header">Oyunçu 2</th>
              <th class="action-cell"></th>
            </tr>
          </thead>
          <tbody id="score-tbody"></tbody>
          <tfoot>
            <tr class="sum-row">
              <td class="round-label">Σ</td>
              <td id="sum1" class="score-cell">0</td>
              <td id="sum2" class="score-cell">0</td>
              <td class="action-cell"></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <button id="add-round-btn" class="add-round-btn" type="button">
        <span class="plus">+</span> Yeni Əl Əlavə Et
      </button>
    </div>
  </main>

  <!-- ===== Toast container ===== -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ===== Custom confirm modal ===== -->
  <div id="confirm-modal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true">
    <div class="modal-content modal-confirm">
      <div class="card">
        <div class="confirm-title" id="confirm-title">Diqqət</div>
        <div class="confirm-message" id="confirm-message"></div>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn btn-secondary">Ləğv et</button>
          <button id="confirm-ok" class="btn btn-primary">Davam et</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js?v=8"></script>
  <script src="/js/app.js?v=8"></script>
</body>
</html>
